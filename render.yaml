# Render.com blueprint for one-click deployment.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: carbon-footprint-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      # Generate a strong random secret in the Render dashboard — never commit
      # one to the repository.
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
